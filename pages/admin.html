<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PageTurner — Admin</title>
  <link rel="stylesheet" href="../css/main.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

  <div class="admin-container">
    <!-- SIDEBAR -->
    <aside class="admin-sidebar">
      <div class="admin-sidebar-logo">PageTurner</div>
      <div class="admin-sidebar-label">Admin Panel</div>

      <button class="admin-nav-item active" data-section="overview">📊 Overview</button>
      <button class="admin-nav-item" data-section="requests">📥 Book Requests</button>
      <button class="admin-nav-item" data-section="books">📚 All Books</button>
      <button class="admin-nav-item" data-section="upload">＋ Upload Book</button>
      <button class="admin-nav-item" data-section="users">👥 Users</button>

      <div style="margin-top:auto;padding-top:2rem;border-top:1px solid var(--border);">
        <div class="theme-toggle" style="flex-direction:column;border-radius:8px;margin-bottom:1rem;">
          <button class="theme-btn" data-theme="light">☀ Light</button>
          <button class="theme-btn" data-theme="dark">🌙 Dark</button>
          <button class="theme-btn" data-theme="vintage">📜 Vintage</button>
        </div>
        <a href="dashboard.html" class="admin-nav-item">← User View</a>
        <button class="admin-nav-item" id="signOutBtn">🚪 Sign Out</button>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="admin-main">

      <!-- OVERVIEW -->
      <section class="admin-section active" id="section-overview">
        <div class="admin-section-header">
          <h2 class="admin-section-title">Overview</h2>
        </div>
        <div class="admin-stats" id="statsGrid"></div>
        <h3 style="font-family:'Playfair Display',serif;font-size:1.1rem;margin-bottom:1rem;">Recent Requests</h3>
        <div id="recentRequests"></div>
      </section>

      <!-- BOOK REQUESTS -->
      <section class="admin-section" id="section-requests">
        <div class="admin-section-header">
          <h2 class="admin-section-title">Book Upload Requests</h2>
        </div>
        <div id="requestsTable"></div>
      </section>

      <!-- ALL BOOKS -->
      <section class="admin-section" id="section-books">
        <div class="admin-section-header">
          <h2 class="admin-section-title">All Books</h2>
          <span id="booksTotalCount" style="color:var(--text-muted);font-size:.85rem;"></span>
        </div>
        <div id="booksTable"></div>
      </section>

      <!-- UPLOAD BOOK (admin direct) -->
      <section class="admin-section" id="section-upload">
        <div class="admin-section-header">
          <h2 class="admin-section-title">Upload Book Directly</h2>
        </div>
        <div style="max-width:560px;">
          <div class="form-group">
            <label class="form-label">Book Title *</label>
            <input id="adTitle" type="text" class="form-input" placeholder="e.g. 1984" />
          </div>
          <div class="form-group">
            <label class="form-label">Author *</label>
            <input id="adAuthor" type="text" class="form-input" placeholder="e.g. George Orwell" />
          </div>
          <div class="form-group">
            <label class="form-label">Description</label>
            <textarea id="adDesc" class="form-textarea" placeholder="Brief summary…"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Published Year</label>
            <input id="adYear" type="number" class="form-input" placeholder="e.g. 1949" />
          </div>
          <div class="form-group">
            <label class="form-label">Genre(s)</label>
            <div class="genre-checkboxes" id="adminGenreChecks"></div>
          </div>
          <div class="form-group">
            <label class="form-label">Book PDF *</label>
            <label class="file-upload-area">
              <input type="file" id="adPdfFile" accept=".pdf" />
              <div class="file-upload-icon">📄</div>
              <div class="file-upload-text">Click or drag a PDF</div>
              <div class="file-name" id="adPdfFileName"></div>
            </label>
          </div>
          <div class="form-group">
            <label class="form-label">Cover Image (optional)</label>
            <label class="file-upload-area">
              <input type="file" id="adCoverFile" accept="image/*" />
              <div class="file-upload-icon">🖼</div>
              <div class="file-upload-text">Click or drag an image</div>
              <div class="file-name" id="adCoverFileName"></div>
            </label>
          </div>
          <button class="btn btn-primary" id="adminUploadBtn" style="min-width:160px;">Upload Book</button>
        </div>
      </section>

      <!-- USERS -->
      <section class="admin-section" id="section-users">
        <div class="admin-section-header">
          <h2 class="admin-section-title">Users</h2>
        </div>
        <div id="usersTable"></div>
      </section>

    </main>
  </div>

  <!-- APPROVE/REJECT MODAL -->
  <div class="modal-overlay" id="reviewModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="reviewModalTitle">Review Request</h3>
        <button class="modal-close">✕</button>
      </div>
      <div class="modal-body" id="reviewModalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost modal-close">Cancel</button>
        <button class="btn btn-ghost" id="rejectBtn" style="color:#e74c3c;border-color:#e74c3c;">✕ Reject</button>
        <button class="btn btn-primary" id="approveBtn">✓ Approve & Publish</button>
      </div>
    </div>
  </div>

  <!-- DELETE BOOK CONFIRM -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal" style="max-width:400px;">
      <div class="modal-header">
        <h3 class="modal-title">Delete Book?</h3>
        <button class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary);">This will permanently remove the book from the library. This cannot be
          undone.</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost modal-close">Cancel</button>
        <button class="btn btn-primary" id="confirmDeleteBtn" style="background:#e74c3c;">Delete Book</button>
      </div>
    </div>
  </div>

  <div class="toast-container"></div>

  <script type="module">
    import { CONFIG, supabaseClient } from '../js/config.js';
    import { initTheme, setupThemeButtons, showToast, openModal, closeModal, setupModals } from '../js/ui.js';
    import { requireAdmin, signOut } from '../js/auth.js';

    const GENRES = ['Fiction', 'Non-Fiction', 'Mystery', 'Thriller', 'Romance', 'Sci-Fi', 'Fantasy', 'Biography', 'History', 'Self-Help', 'Science', 'Philosophy', 'Poetry', 'Children', 'Horror', 'Adventure', 'Classics', 'Comics'];

    let adminUser = null;
    let adminProfile = null;
    let currentReviewId = null;
    let currentDeleteId = null;

    async function init() {
      initTheme();
      setupThemeButtons();
      setupModals();

      const result = await requireAdmin();
      if (!result) return;
      adminUser = result.user;
      adminProfile = result.profile;

      renderAdminGenres();
      setupNav();
      await loadOverview();
      setupEvents();
    }

    function setupNav() {
      document.querySelectorAll('.admin-nav-item[data-section]').forEach(btn => {
        btn.addEventListener('click', async () => {
          document.querySelectorAll('.admin-nav-item').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const s = btn.dataset.section;
          document.querySelectorAll('.admin-section').forEach(sec => sec.classList.toggle('active', sec.id === `section-${s}`));
          if (s === 'overview') await loadOverview();
          if (s === 'requests') await loadRequests();
          if (s === 'books') await loadAllBooks();
          if (s === 'users') await loadUsers();
        });
      });
    }

    function renderAdminGenres() {
      const container = document.getElementById('adminGenreChecks');
      GENRES.forEach(g => {
        const label = document.createElement('label');
        label.className = 'genre-check-item';
        label.innerHTML = `<input type="checkbox" value="${g}"/>${g}`;
        container.appendChild(label);
      });
    }

    // ── Overview ───────────────────────────────────────────────
    async function loadOverview() {
      const [reqs, books, users] = await Promise.all([
        supabaseClient.from('book_requests').select('*').order('created_at', { ascending: false }).limit(5),
        supabaseClient.from('books').select('id', { count: 'exact', head: true }),
        supabaseClient.from('profiles').select('id', { count: 'exact', head: true })
      ]);

      const pendingReqs = reqs.data?.filter(r => r.status === 'pending').length || 0;

      document.getElementById('statsGrid').innerHTML = `
    <div class="admin-stat-card">
      <div class="admin-stat-value">${pendingReqs}</div>
      <div class="admin-stat-label">Pending Requests</div>
    </div>
    <div class="admin-stat-card">
      <div class="admin-stat-value">${books.count || 0}</div>
      <div class="admin-stat-label">Total Books</div>
    </div>
    <div class="admin-stat-card">
      <div class="admin-stat-value">${users.count || 0}</div>
      <div class="admin-stat-label">Total Users</div>
    </div>
  `;

      const recent = reqs.data || [];
      document.getElementById('recentRequests').innerHTML = recent.length ? `
    <div class="admin-table-wrapper">
      <table class="admin-table">
        <thead><tr><th>Title</th><th>Author</th><th>Requested By</th><th>Status</th><th>Date</th></tr></thead>
        <tbody>${recent.map(r => `
          <tr>
            <td>${r.title}</td>
            <td>${r.author}</td>
            <td>${r.requester_email || '-'}</td>
            <td><span class="status-badge ${r.status}">${r.status}</span></td>
            <td>${new Date(r.created_at).toLocaleDateString()}</td>
          </tr>
        `).join('')}</tbody>
      </table>
    </div>
  ` : '<p style="color:var(--text-muted)">No requests yet.</p>';
    }

    // ── Requests ────────────────────────────────────────────────
    async function loadRequests() {
      const { data } = await supabaseClient.from('book_requests').select('*').order('created_at', { ascending: false });
      const container = document.getElementById('requestsTable');

      if (!data?.length) {
        container.innerHTML = '<p style="color:var(--text-muted)">No requests yet.</p>';
        return;
      }

      container.innerHTML = `
    <div class="admin-table-wrapper">
      <table class="admin-table">
        <thead><tr><th>Title</th><th>Author</th><th>Genre</th><th>Requested By</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
        <tbody>${data.map(r => `
          <tr>
            <td>${r.title}</td>
            <td>${r.author}</td>
            <td>${(r.genre || []).join(', ')}</td>
            <td>${r.requester_email || '-'}</td>
            <td><span class="status-badge ${r.status}">${r.status}</span></td>
            <td>${new Date(r.created_at).toLocaleDateString()}</td>
            <td>
              ${r.status === 'pending' ? `<button class="btn btn-primary btn-sm" onclick="openReview('${r.id}')">Review & Accept</button>` : '-'}
            </td>
          </tr>
        `).join('')}</tbody>
      </table>
    </div>
  `;
    }

    window.openReview = async function (id) {
      currentReviewId = id;
      const { data } = await supabaseClient.from('book_requests').select('*').eq('id', id).single();
      if (!data) return;

      document.getElementById('reviewModalTitle').textContent = `Review: ${data.title}`;
      let pdfLink = data.pdf_url || '';
      if (pdfLink && !pdfLink.startsWith('http')) {
        const { data: signed, error: signedError } = await supabaseClient.storage.from('books-pdf').createSignedUrl(pdfLink, 60);
        if (!signedError && signed?.signedUrl) pdfLink = signed.signedUrl;
      }

      document.getElementById('reviewModalBody').innerHTML = `
    <p><strong>Author:</strong> ${data.author}</p>
    <p><strong>Genre:</strong> ${(data.genre || []).join(', ')}</p>
    <p><strong>Description:</strong> ${data.description || 'N/A'}</p>
    <p><strong>Requested by:</strong> ${data.requester_email}</p>
    <p><strong>Date:</strong> ${new Date(data.created_at).toLocaleString()}</p>
    ${pdfLink ? `<p><a href="${pdfLink}" target="_blank">📄 View PDF</a></p>` : ''}
    ${data.cover_url ? `<p><a href="${data.cover_url}" target="_blank">🖼 View Cover</a></p>` : ''}
  `;
      openModal('reviewModal');
    };

    document.getElementById('approveBtn').addEventListener('click', async () => {
      if (!currentReviewId) return;
      const { data, error: requestErr } = await supabaseClient.from('book_requests').select('*').eq('id', currentReviewId).single();
      if (requestErr || !data) {
        showToast('Unable to approve request', 'error');
        return;
      }

      const { error: insertErr } = await supabaseClient.from('books').insert({
        title: data.title,
        author: data.author,
        description: data.description,
        genre: data.genre,
        pdf_url: data.pdf_url,
        cover_url: data.cover_url,
        published_year: data.published_year,
        status: 'approved',
        uploaded_by: data.requested_by
      });
      if (insertErr) {
        showToast('Failed to publish book: ' + insertErr.message, 'error');
        return;
      }

      const { error: updateErr } = await supabaseClient.from('book_requests').update({ status: 'approved' }).eq('id', currentReviewId);
      if (updateErr) {
        showToast('Published book but failed to update request status', 'warning');
      }

      closeModal('reviewModal');
      showToast('Book approved and published!', 'success');
      loadRequests();
      loadOverview();
    });

    document.getElementById('rejectBtn').addEventListener('click', async () => {
      if (!currentReviewId) return;
      const { error } = await supabaseClient.from('book_requests').update({ status: 'rejected' }).eq('id', currentReviewId);
      if (error) {
        showToast('Failed to reject request', 'error');
        return;
      }
      closeModal('reviewModal');
      showToast('Request rejected', 'info');
      loadRequests();
      loadOverview();
    });

    // ── All Books ──────────────────────────────────────────────
    async function loadAllBooks() {
      const { data } = await supabaseClient.from('books').select('*').order('created_at', { ascending: false });
      const container = document.getElementById('booksTable');
      document.getElementById('booksTotalCount').textContent = `${data?.length || 0} books`;

      if (!data?.length) {
        container.innerHTML = '<p style="color:var(--text-muted)">No books yet.</p>';
        return;
      }

      container.innerHTML = `
    <div class="admin-table-wrapper">
      <table class="admin-table">
        <thead><tr><th>Title</th><th>Author</th><th>Genre</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
        <tbody>${data.map(b => `
          <tr>
            <td>${b.title}</td>
            <td>${b.author}</td>
            <td>${(b.genre || []).join(', ')}</td>
            <td><span class="status-badge ${b.status}">${b.status}</span></td>
            <td>${new Date(b.created_at).toLocaleDateString()}</td>
            <td>
              <button class="btn btn-ghost btn-sm" onclick="window.open('../upload/reader.html?id=${b.id}', '_blank')">Read</button>
              <button class="btn btn-ghost btn-sm" style="color:#e74c3c;border-color:#e74c3c;" onclick="confirmDeleteBook('${b.id}')">Delete</button>
            </td>
          </tr>
        `).join('')}</tbody>
      </table>
    </div>
  `;
    }

    window.confirmDeleteBook = function (id) {
      currentDeleteId = id;
      openModal('deleteModal');
    };

    document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
      if (!currentDeleteId) return;
      await supabaseClient.from('books').delete().eq('id', currentDeleteId);
      closeModal('deleteModal');
      showToast('Book deleted', 'success');
      loadAllBooks();
      loadOverview();
    });

    // ── Users ──────────────────────────────────────────────────
    async function loadUsers() {
      const { data } = await supabaseClient.from('profiles').select('*').order('created_at', { ascending: false });
      const container = document.getElementById('usersTable');

      if (!data?.length) {
        container.innerHTML = '<p style="color:var(--text-muted)">No users yet.</p>';
        return;
      }

      container.innerHTML = `
    <div class="admin-table-wrapper">
      <table class="admin-table">
        <thead><tr><th>Username</th><th>Email</th><th>Role</th><th>Joined</th><th>Actions</th></tr></thead>
        <tbody>${data.map(p => `
          <tr>
            <td>${p.username || '-'}</td>
            <td>${p.email || '-'}</td>
            <td><span class="status-badge ${p.role === 'admin' ? 'admin' : 'user'}">${p.role || 'user'}</span></td>
            <td>${new Date(p.created_at).toLocaleDateString()}</td>
            <td>
              ${p.role !== 'admin' ? `<button class="btn btn-ghost btn-sm" onclick="makeAdmin('${p.id}')">Make Admin</button>` : '-'}
            </td>
          </tr>
        `).join('')}</tbody>
      </table>
    </div>
  `;
    }

    window.makeAdmin = async function (id) {
      await supabaseClient.from('profiles').update({ role: 'admin' }).eq('id', id);
      showToast('User promoted to admin', 'success');
      loadUsers();
    };

    // ── Admin Upload ───────────────────────────────────────────
    document.getElementById('adminUploadBtn').addEventListener('click', async () => {
      const title = document.getElementById('adTitle').value.trim();
      const author = document.getElementById('adAuthor').value.trim();
      const desc = document.getElementById('adDesc').value.trim();
      const year = document.getElementById('adYear').value;
      const pdfFile = document.getElementById('adPdfFile').files[0];
      const coverFile = document.getElementById('adCoverFile').files[0];
      const genres = [...document.querySelectorAll('#adminGenreChecks input:checked')].map(i => i.value);

      if (!title || !author || !pdfFile) { showToast('Title, author and PDF are required', 'error'); return; }

      const btn = document.getElementById('adminUploadBtn');
      btn.disabled = true; btn.textContent = 'Uploading…';

      try {
        const pdfPath = `books/${Date.now()}_${pdfFile.name}`;
        await supabaseClient.storage.from('books-pdf').upload(pdfPath, pdfFile);
        const { data: { publicUrl: pdfUrl } } = supabaseClient.storage.from('books-pdf').getPublicUrl(pdfPath);

        let coverUrl = null;
        if (coverFile) {
          const coverPath = `covers/${Date.now()}_${coverFile.name}`;
          await supabaseClient.storage.from('book-covers').upload(coverPath, coverFile);
          const { data: { publicUrl } } = supabaseClient.storage.from('book-covers').getPublicUrl(coverPath);
          coverUrl = publicUrl;
        }

        await supabaseClient.from('books').insert({
          title, author, description: desc, published_year: year ? parseInt(year) : null,
          genre: genres, pdf_url: pdfUrl, cover_url: coverUrl,
          status: 'approved', uploaded_by: adminUser.id
        });

        showToast('Book uploaded successfully!', 'success');
        ['adTitle', 'adAuthor', 'adDesc', 'adYear'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('adPdfFile').value = '';
        document.getElementById('adCoverFile').value = '';
        document.getElementById('adPdfFileName').textContent = '';
        document.getElementById('adCoverFileName').textContent = '';
        document.querySelectorAll('#adminGenreChecks input').forEach(i => i.checked = false);
        loadAllBooks();
        loadOverview();
      } catch (err) {
        showToast(err.message || 'Upload failed', 'error');
      } finally {
        btn.disabled = false; btn.textContent = 'Upload Book';
      }
    });

    // ── Events ─────────────────────────────────────────────────
    function setupEvents() {
      document.getElementById('signOutBtn').addEventListener('click', signOut);

      // File name display
      ['adPdfFile', 'adCoverFile'].forEach(id => {
        const input = document.getElementById(id);
        const nameEl = document.getElementById(id + 'Name');
        input?.addEventListener('change', () => {
          if (nameEl) nameEl.textContent = input.files[0]?.name || '';
        });
      });
    }

    init();
  </script>
</body>

</html>
