<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PageTurner — Reader</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    body { overflow: hidden; }
    html, body { height: 100%; }
    #pdfCanvas { display: block; margin: 0 auto; max-width: 100%; box-shadow: 0 4px 32px rgba(0,0,0,0.15); }
    .canvas-wrapper {
      overflow-y: auto;
      height: calc(100vh - 52px);
      padding: 1.5rem;
      background: var(--reader-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .page-container { position: relative; }
    .loading-bar {
      height: 3px;
      background: var(--accent);
      position: fixed;
      top: 0;
      left: 0;
      z-index: 999;
      transition: width 0.3s;
    }
    .sidebar-toggle {
      position: fixed;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      z-index: 50;
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-right: none;
      border-radius: 8px 0 0 8px;
      padding: 0.75rem 0.4rem;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--text-muted);
      transition: all 0.2s;
      writing-mode: vertical-rl;
    }
    .sidebar-toggle:hover { color: var(--accent); }
    .reading-progress-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 3px;
      background: var(--accent);
      transition: width 0.3s;
      z-index: 100;
    }
    .note-color-picker { display: flex; gap: 0.4rem; margin-bottom: 0.5rem; }
    .color-dot {
      width: 20px; height: 20px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: all 0.15s;
    }
    .color-dot.selected { border-color: var(--text-primary); transform: scale(1.2); }
  </style>
</head>
<body>

<div class="loading-bar" id="loadingBar" style="width:0%"></div>

<div class="reader-container">
  <!-- MAIN READING AREA -->
  <div class="reader-main">
    <!-- Toolbar -->
    <div class="reader-toolbar">
      <button class="btn btn-ghost btn-sm" onclick="history.back()">← Back</button>
      <span class="reader-toolbar-title" id="bookTitle">Loading…</span>

      <div class="page-nav">
        <button class="btn btn-ghost btn-sm" id="prevPage">‹</button>
        <input type="number" id="pageInput" min="1" value="1"/>
        <span id="totalPagesLabel">/ –</span>
        <button class="btn btn-ghost btn-sm" id="nextPage">›</button>
      </div>

      <div class="theme-toggle">
        <button class="theme-btn" data-theme="light">☀</button>
        <button class="theme-btn" data-theme="dark">🌙</button>
        <button class="theme-btn" data-theme="vintage">📜</button>
      </div>

      <button class="btn btn-outline btn-sm" id="addBookmarkBtn">🔖 Bookmark</button>
    </div>

    <!-- PDF Canvas Area -->
    <div class="canvas-wrapper" id="canvasWrapper">
      <div style="color:var(--text-muted);margin-top:4rem;">Loading PDF…</div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="reader-sidebar" id="readerSidebar">
    <div class="sidebar-tabs">
      <button class="sidebar-tab active" data-tab="notes">📝 Notes</button>
      <button class="sidebar-tab" data-tab="bookmarks">🔖 Marks</button>
      <button class="sidebar-tab" data-tab="progress">📊 Progress</button>
    </div>

    <div class="sidebar-content">
      <!-- Notes Tab -->
      <div class="tab-panel active" id="tab-notes">
        <div id="notesList"><p style="color:var(--text-muted);font-size:.82rem;">No notes yet on this page.</p></div>
      </div>

      <!-- Bookmarks Tab -->
      <div class="tab-panel" id="tab-bookmarks">
        <div id="bookmarksList"><p style="color:var(--text-muted);font-size:.82rem;">No bookmarks yet.</p></div>
      </div>

      <!-- Progress Tab -->
      <div class="tab-panel" id="tab-progress">
        <div id="progressInfo" style="font-size:.85rem;line-height:1.8;color:var(--text-secondary);"></div>
      </div>
    </div>

    <!-- Note Input -->
    <div class="note-input-area" id="noteInputArea">
      <div class="note-color-picker" id="colorPicker">
        <div class="color-dot selected" style="background:#FFEB3B" data-color="#FFEB3B"></div>
        <div class="color-dot" style="background:#A5D6A7" data-color="#A5D6A7"></div>
        <div class="color-dot" style="background:#90CAF9" data-color="#90CAF9"></div>
        <div class="color-dot" style="background:#F48FB1" data-color="#F48FB1"></div>
        <div class="color-dot" style="background:#FFCC80" data-color="#FFCC80"></div>
      </div>
      <textarea class="note-textarea" id="noteText" placeholder="Write a note on this page…"></textarea>
      <div style="display:flex;gap:.5rem;margin-top:.5rem;">
        <button class="btn btn-primary btn-sm" style="flex:1;" id="saveNoteBtn">Save Note</button>
        <button class="btn btn-ghost btn-sm" id="clearNoteBtn">Clear</button>
      </div>
    </div>
  </div>
</div>

<!-- Sidebar Toggle -->
<button class="sidebar-toggle" id="sidebarToggle" title="Toggle Sidebar">Notes ▸</button>

<!-- Reading Progress Bar -->
<div class="reading-progress-bar" id="readingProgressBar" style="width:0%"></div>

<div class="toast-container"></div>

<script type="module">
import { CONFIG, supabaseClient } from '../js/config.js';
import { initTheme, applyTheme, setupThemeButtons, showToast } from '../js/ui.js';
import { requireAuth } from '../js/auth.js';

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const params = new URLSearchParams(location.search);
const bookId = params.get('id');

let currentUser = null;
let book = null;
let pdfDoc = null;
let currentPage = 1;
let totalPages = 0;
let selectedColor = '#FFEB3B';
let sidebarOpen = true;
let renderTask = null;

async function init() {
  initTheme();
  setupThemeButtons();
  currentUser = await requireAuth();
  if (!currentUser) return;

  if (!bookId) { showToast('No book specified', 'error'); return; }

  // Load book
  const { data, error } = await supabaseClient.from('books').select('*').eq('id', bookId).single();
  if (error || !data) { showToast('Book not found', 'error'); return; }
  book = data;
  document.getElementById('bookTitle').textContent = book.title;
  document.title = `${book.title} — PageTurner`;

  const resolvedPdfUrl = await resolveBookPdfUrl(book.pdf_url);
  if (!resolvedPdfUrl) {
    showToast('Unable to access book PDF', 'error');
    return;
  }

  // Load saved progress
  const { data: prog } = await supabaseClient.from('reading_progress')
    .select('current_page,total_pages').eq('user_id', currentUser.id).eq('book_id', bookId).single();
  if (prog) currentPage = prog.current_page || 1;

  // Load PDF
  await loadPDF(resolvedPdfUrl);
  setupEvents();
  await loadAllNotes();
  await loadAllBookmarks();
  renderProgressTab();
}

async function resolveBookPdfUrl(path) {
  if (!path) return null;
  if (path.startsWith('http')) return path;
  const { data, error } = await supabaseClient.storage.from('books-pdf').createSignedUrl(path, 60);
  return error ? null : data?.signedUrl || null;
}

async function loadPDF(url) {
  try {
    document.getElementById('loadingBar').style.width = '30%';
    pdfDoc = await pdfjsLib.getDocument({ url, withCredentials: false }).promise;
    totalPages = pdfDoc.numPages;
    document.getElementById('totalPagesLabel').textContent = `/ ${totalPages}`;
    document.getElementById('pageInput').max = totalPages;
    document.getElementById('loadingBar').style.width = '80%';
    await renderAllPages();
    document.getElementById('loadingBar').style.width = '100%';
    setTimeout(() => document.getElementById('loadingBar').style.width = '0%', 500);
    scrollToPage(currentPage);
  } catch(err) {
    showToast('Failed to load PDF: ' + err.message, 'error');
    document.getElementById('canvasWrapper').innerHTML = `<div class="empty-state"><div class="empty-state-icon">📄</div><h3>Could not load PDF</h3><p>The file may be inaccessible or corrupted.</p></div>`;
  }
}

async function renderAllPages() {
  const wrapper = document.getElementById('canvasWrapper');
  wrapper.innerHTML = '';
  for (let i = 1; i <= totalPages; i++) {
    const page = await pdfDoc.getPage(i);
    const viewport = page.getViewport({ scale: 1.4 });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    canvas.id = `page-${i}`;
    const container = document.createElement('div');
    container.className = 'page-container';
    container.dataset.page = i;
    container.appendChild(canvas);
    wrapper.appendChild(container);
    page.render({ canvasContext: canvas.getContext('2d'), viewport });
  }
  // Intersection observer to track current page
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting && e.intersectionRatio > 0.5) {
        const pg = parseInt(e.target.dataset.page);
        if (pg !== currentPage) { currentPage = pg; onPageChange(); }
      }
    });
  }, { threshold: 0.5 });
  document.querySelectorAll('.page-container').forEach(c => observer.observe(c));
}

function scrollToPage(page) {
  const el = document.getElementById(`page-${page}`);
  el?.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function onPageChange() {
  document.getElementById('pageInput').value = currentPage;
  updateProgress();
  renderNotesForPage();
}

function updateProgress() {
  const pct = Math.round((currentPage / totalPages) * 100);
  document.getElementById('readingProgressBar').style.width = `${pct}%`;
  // Save to DB (debounced)
  clearTimeout(window._progressTimer);
  window._progressTimer = setTimeout(saveProgress, 1500);
  renderProgressTab();
}

async function saveProgress() {
  if (!currentUser || !bookId) return;
  await supabaseClient.from('reading_progress').upsert({
    user_id: currentUser.id, book_id: bookId,
    current_page: currentPage, total_pages: totalPages,
    last_read_at: new Date().toISOString()
  }, { onConflict: 'user_id,book_id' });
}

function renderProgressTab() {
  const pct = totalPages ? Math.round((currentPage / totalPages) * 100) : 0;
  document.getElementById('progressInfo').innerHTML = `
    <div style="margin-bottom:1rem;">
      <div style="font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;margin-bottom:.5rem;">${book?.title || ''}</div>
      <div style="color:var(--text-muted);font-size:.8rem;">by ${book?.author || ''}</div>
    </div>
    <div style="background:var(--bg-secondary);border-radius:8px;height:8px;margin-bottom:.75rem;overflow:hidden;">
      <div style="height:100%;background:var(--accent);width:${pct}%;border-radius:8px;transition:width .3s;"></div>
    </div>
    <div>📖 Page <strong>${currentPage}</strong> of <strong>${totalPages}</strong></div>
    <div>📊 <strong>${pct}%</strong> complete</div>
    <div>🕐 Last read: <strong>Just now</strong></div>`;
}

// ── Notes ──────────────────────────────────────────────────
let allNotes = [];

async function loadAllNotes() {
  const { data } = await supabaseClient.from('notes').select('*')
    .eq('user_id', currentUser.id).eq('book_id', bookId).order('created_at', { ascending: false });
  allNotes = data || [];
  renderNotesForPage();
}

function renderNotesForPage() {
  const notes = allNotes.filter(n => n.page_number === currentPage);
  const list = document.getElementById('notesList');
  if (!notes.length) { list.innerHTML = `<p style="color:var(--text-muted);font-size:.82rem;">No notes on page ${currentPage}.</p>`; return; }
  list.innerHTML = notes.map(n => `
    <div class="note-item" style="border-left:3px solid ${n.color || '#FFEB3B'};">
      <div class="note-item-header">
        <span class="note-page-badge">Page ${n.page_number}</span>
        <button class="delete-btn" onclick="deleteNote('${n.id}')">🗑</button>
      </div>
      <div style="font-size:.82rem;line-height:1.5;">${n.content}</div>
    </div>`).join('');
}

window.deleteNote = async (id) => {
  await supabaseClient.from('notes').delete().eq('id', id);
  allNotes = allNotes.filter(n => n.id !== id);
  renderNotesForPage();
  showToast('Note deleted', 'info');
};

async function saveNote() {
  const content = document.getElementById('noteText').value.trim();
  if (!content) { showToast('Write something first', 'error'); return; }
  const { data, error } = await supabaseClient.from('notes').insert({
    user_id: currentUser.id, book_id: bookId,
    page_number: currentPage, content, color: selectedColor
  }).select().single();
  if (error) { showToast('Failed to save note', 'error'); return; }
  allNotes.unshift(data);
  document.getElementById('noteText').value = '';
  renderNotesForPage();
  showToast('Note saved! 📝', 'success');
}

// ── Bookmarks ──────────────────────────────────────────────
let allBookmarks = [];

async function loadAllBookmarks() {
  const { data } = await supabaseClient.from('bookmarks').select('*')
    .eq('user_id', currentUser.id).eq('book_id', bookId).order('page_number');
  allBookmarks = data || [];
  renderBookmarks();
}

function renderBookmarks() {
  const list = document.getElementById('bookmarksList');
  if (!allBookmarks.length) { list.innerHTML = `<p style="color:var(--text-muted);font-size:.82rem;">No bookmarks yet. Use the 🔖 button to bookmark a page.</p>`; return; }
  list.innerHTML = allBookmarks.map(b => `
    <div class="bookmark-item">
      <div class="bookmark-item-header">
        <span class="note-page-badge" style="cursor:pointer;" onclick="scrollToPage(${b.page_number})">Page ${b.page_number}</span>
        <button class="delete-btn" onclick="deleteBookmark('${b.id}')">🗑</button>
      </div>
      <div style="font-size:.78rem;color:var(--text-muted);">${b.label || 'Bookmark'}</div>
    </div>`).join('');
}

async function addBookmark() {
  const existing = allBookmarks.find(b => b.page_number === currentPage);
  if (existing) { showToast('Already bookmarked!', 'info'); return; }
  const label = prompt(`Add a label for page ${currentPage}:`) || `Page ${currentPage}`;
  const { data, error } = await supabaseClient.from('bookmarks').insert({
    user_id: currentUser.id, book_id: bookId, page_number: currentPage, label
  }).select().single();
  if (error) { showToast('Failed to add bookmark', 'error'); return; }
  allBookmarks.push(data);
  allBookmarks.sort((a, b) => a.page_number - b.page_number);
  renderBookmarks();
  showToast('Bookmark added! 🔖', 'success');
}

window.deleteBookmark = async (id) => {
  await supabaseClient.from('bookmarks').delete().eq('id', id);
  allBookmarks = allBookmarks.filter(b => b.id !== id);
  renderBookmarks();
  showToast('Bookmark removed', 'info');
};

window.scrollToPage = scrollToPage;

// ── Events ─────────────────────────────────────────────────
function setupEvents() {
  // Theme
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.addEventListener('click', () => applyTheme(btn.dataset.theme));
  });

  // Page navigation
  document.getElementById('prevPage').addEventListener('click', () => {
    if (currentPage > 1) { scrollToPage(currentPage - 1); }
  });
  document.getElementById('nextPage').addEventListener('click', () => {
    if (currentPage < totalPages) { scrollToPage(currentPage + 1); }
  });
  document.getElementById('pageInput').addEventListener('change', e => {
    const p = Math.min(Math.max(1, parseInt(e.target.value) || 1), totalPages);
    scrollToPage(p);
  });

  // Sidebar toggle
  document.getElementById('sidebarToggle').addEventListener('click', () => {
    sidebarOpen = !sidebarOpen;
    document.getElementById('readerSidebar').classList.toggle('collapsed', !sidebarOpen);
    document.getElementById('sidebarToggle').textContent = sidebarOpen ? 'Notes ▸' : 'Notes ◂';
  });

  // Sidebar tabs
  document.querySelectorAll('.sidebar-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.toggle('active', t === tab));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === `tab-${tab.dataset.tab}`));
      // Show/hide note input only on notes tab
      document.getElementById('noteInputArea').style.display = tab.dataset.tab === 'notes' ? 'block' : 'none';
    });
  });

  // Note color
  document.querySelectorAll('.color-dot').forEach(dot => {
    dot.addEventListener('click', () => {
      document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
      dot.classList.add('selected');
      selectedColor = dot.dataset.color;
    });
  });

  document.getElementById('saveNoteBtn').addEventListener('click', saveNote);
  document.getElementById('clearNoteBtn').addEventListener('click', () => document.getElementById('noteText').value = '');
  document.getElementById('addBookmarkBtn').addEventListener('click', addBookmark);

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') scrollToPage(Math.min(currentPage + 1, totalPages));
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') scrollToPage(Math.max(currentPage - 1, 1));
    if (e.key === 'b') addBookmark();
  });
}

init();
</script>
</body>
</html>
