<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PageTurner — Admin</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="admin-container">
  <!-- SIDEBAR -->
  <aside class="admin-sidebar">
    <div class="admin-sidebar-logo">PageTurner</div>
    <div class="admin-sidebar-label">Admin Panel</div>

    <button class="admin-nav-item active" data-section="overview">📊 Overview</button>
    <button class="admin-nav-item" data-section="requests">📥 Book Requests</button>
    <button class="admin-nav-item" data-section="books">📚 All Books</button>
    <button class="admin-nav-item" data-section="upload">＋ Upload Book</button>
    <button class="admin-nav-item" data-section="users">👥 Users</button>

    <div style="margin-top:auto;padding-top:2rem;border-top:1px solid var(--border);">
      <div class="theme-toggle" style="flex-direction:column;border-radius:8px;margin-bottom:1rem;">
        <button class="theme-btn" data-theme="light">☀ Light</button>
        <button class="theme-btn" data-theme="dark">🌙 Dark</button>
        <button class="theme-btn" data-theme="vintage">📜 Vintage</button>
      </div>
      <a href="../pages/dashboard.html" class="admin-nav-item">← User View</a>
      <button class="admin-nav-item" id="signOutBtn">🚪 Sign Out</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="admin-main">

    <!-- OVERVIEW -->
    <section class="admin-section active" id="section-overview">
      <div class="admin-section-header">
        <h2 class="admin-section-title">Overview</h2>
      </div>
      <div class="admin-stats" id="statsGrid"></div>
      <h3 style="font-family:'Playfair Display',serif;font-size:1.1rem;margin-bottom:1rem;">Recent Requests</h3>
      <div id="recentRequests"></div>
    </section>

    <!-- BOOK REQUESTS -->
    <section class="admin-section" id="section-requests">
      <div class="admin-section-header">
        <h2 class="admin-section-title">Book Upload Requests</h2>
      </div>
      <div id="requestsTable"></div>
    </section>

    <!-- ALL BOOKS -->
    <section class="admin-section" id="section-books">
      <div class="admin-section-header">
        <h2 class="admin-section-title">All Books</h2>
        <span id="booksTotalCount" style="color:var(--text-muted);font-size:.85rem;"></span>
      </div>
      <div id="booksTable"></div>
    </section>

    <!-- UPLOAD BOOK (admin direct) -->
    <section class="admin-section" id="section-upload">
      <div class="admin-section-header">
        <h2 class="admin-section-title">Upload Book Directly</h2>
      </div>
      <div style="max-width:560px;">
        <div class="form-group">
          <label class="form-label">Book Title *</label>
          <input id="adTitle" type="text" class="form-input" placeholder="e.g. 1984"/>
        </div>
        <div class="form-group">
          <label class="form-label">Author *</label>
          <input id="adAuthor" type="text" class="form-input" placeholder="e.g. George Orwell"/>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea id="adDesc" class="form-textarea" placeholder="Brief summary…"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Published Year</label>
          <input id="adYear" type="number" class="form-input" placeholder="e.g. 1949"/>
        </div>
        <div class="form-group">
          <label class="form-label">Genre(s)</label>
          <div class="genre-checkboxes" id="adminGenreChecks"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Book PDF *</label>
          <label class="file-upload-area">
            <input type="file" id="adPdfFile" accept=".pdf"/>
            <div class="file-upload-icon">📄</div>
            <div class="file-upload-text">Click or drag a PDF</div>
            <div class="file-name" id="adPdfFileName"></div>
          </label>
        </div>
        <div class="form-group">
          <label class="form-label">Cover Image (optional)</label>
          <label class="file-upload-area">
            <input type="file" id="adCoverFile" accept="image/*"/>
            <div class="file-upload-icon">🖼</div>
            <div class="file-upload-text">Click or drag an image</div>
            <div class="file-name" id="adCoverFileName"></div>
          </label>
        </div>
        <button class="btn btn-primary" id="adminUploadBtn" style="min-width:160px;">Upload Book</button>
      </div>
    </section>

    <!-- USERS -->
    <section class="admin-section" id="section-users">
      <div class="admin-section-header">
        <h2 class="admin-section-title">Users</h2>
      </div>
      <div id="usersTable"></div>
    </section>

  </main>
</div>

<!-- APPROVE/REJECT MODAL -->
<div class="modal-overlay" id="reviewModal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="reviewModalTitle">Review Request</h3>
      <button class="modal-close">✕</button>
    </div>
    <div class="modal-body" id="reviewModalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost modal-close">Cancel</button>
      <button class="btn btn-ghost" id="rejectBtn" style="color:#e74c3c;border-color:#e74c3c;">✕ Reject</button>
      <button class="btn btn-primary" id="approveBtn">✓ Approve & Publish</button>
    </div>
  </div>
</div>

<!-- DELETE BOOK CONFIRM -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal" style="max-width:400px;">
    <div class="modal-header">
      <h3 class="modal-title">Delete Book?</h3>
      <button class="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <p style="color:var(--text-secondary);">This will permanently remove the book from the library. This cannot be undone.</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost modal-close">Cancel</button>
      <button class="btn btn-primary" id="confirmDeleteBtn" style="background:#e74c3c;">Delete Book</button>
    </div>
  </div>
</div>

<div class="toast-container"></div>

<script type="module">
import { CONFIG, supabaseClient } from '../js/config.js';
import { initTheme, setupThemeButtons, showToast, openModal, closeModal, setupModals } from '../js/ui.js';
import { requireAdmin, signOut } from '../js/auth.js';

const GENRES = ['Fiction','Non-Fiction','Mystery','Thriller','Romance','Sci-Fi','Fantasy','Biography','History','Self-Help','Science','Philosophy','Poetry','Children','Horror','Adventure','Classics','Comics'];

let adminUser = null;
let adminProfile = null;
let currentReviewId = null;
let currentDeleteId = null;

async function init() {
  initTheme();
  setupThemeButtons();
  setupModals();

  const result = await requireAdmin();
  if (!result) return;
  adminUser = result.user;
  adminProfile = result.profile;

  renderAdminGenres();
  setupNav();
  await loadOverview();
  setupEvents();
}

function setupNav() {
  document.querySelectorAll('.admin-nav-item[data-section]').forEach(btn => {
    btn.addEventListener('click', async () => {
      document.querySelectorAll('.admin-nav-item').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const s = btn.dataset.section;
      document.querySelectorAll('.admin-section').forEach(sec => sec.classList.toggle('active', sec.id === `section-${s}`));
      if (s === 'overview') await loadOverview();
      if (s === 'requests') await loadRequests();
      if (s === 'books') await loadAllBooks();
      if (s === 'users') await loadUsers();
    });
  });
}

// ── Overview ───────────────────────────────────────────────
async function loadOverview() {
  const [{ count: booksCount }, { count: reqCount }, { count: usersCount }, { count: pendingCount }] = await Promise.all([
    supabaseClient.from('books').select('*', { count: 'exact', head: true }).eq('status','approved'),
    supabaseClient.from('book_requests').select('*', { count: 'exact', head: true }),
    supabaseClient.from('profiles').select('*', { count: 'exact', head: true }),
    supabaseClient.from('book_requests').select('*', { count: 'exact', head: true }).eq('status','pending'),
  ]);

  document.getElementById('statsGrid').innerHTML = [
    { n: booksCount || 0, l: 'Published Books', icon: '📚' },
    { n: pendingCount || 0, l: 'Pending Requests', icon: '📥' },
    { n: reqCount || 0, l: 'Total Requests', icon: '📋' },
    { n: usersCount || 0, l: 'Registered Users', icon: '👥' },
  ].map(s => `<div class="stat-card"><div style="font-size:1.5rem;">${s.icon}</div><div class="stat-number">${s.n}</div><div class="stat-label">${s.l}</div></div>`).join('');

  const { data: recent } = await supabaseClient.from('book_requests').select('*').order('created_at', { ascending: false }).limit(5);
  document.getElementById('recentRequests').innerHTML = renderRequestsTable(recent || []);
}

// ── Requests ───────────────────────────────────────────────
async function loadRequests() {
  const { data } = await supabaseClient.from('book_requests').select('*').order('created_at', { ascending: false });
  document.getElementById('requestsTable').innerHTML = renderRequestsTable(data || []);
}

function renderRequestsTable(requests) {
  if (!requests.length) return `<div class="empty-state"><div class="empty-state-icon">📥</div><h3>No requests yet</h3></div>`;
  return `<div class="admin-table-wrapper"><table class="admin-table">
    <thead><tr><th>Title</th><th>Author</th><th>Submitted By</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>${requests.map(r => `<tr>
      <td><strong>${r.title}</strong></td>
      <td>${r.author}</td>
      <td style="font-size:.8rem;">${r.requester_email || '—'}</td>
      <td style="font-size:.8rem;">${new Date(r.created_at).toLocaleDateString()}</td>
      <td><span class="status-badge ${r.status}">${r.status}</span></td>
      <td>${r.status === 'pending' ? `<button class="btn btn-outline btn-sm" onclick="openReview('${r.id}')">Review</button>` : '—'}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

window.openReview = async (id) => {
  const { data: req } = await supabaseClient.from('book_requests').select('*').eq('id', id).single();
  if (!req) return;
  currentReviewId = id;
  document.getElementById('reviewModalTitle').textContent = `Review: "${req.title}"`;
  document.getElementById('reviewModalBody').innerHTML = `
    <div style="display:grid;grid-template-columns:120px 1fr;gap:1rem;align-items:start;">
      ${req.cover_url ? `<img src="${req.cover_url}" style="width:120px;border-radius:8px;"/>` : `<div style="width:120px;height:180px;background:var(--bg-sidebar);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:2rem;">📖</div>`}
      <div>
        <div style="font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;margin-bottom:.4rem;">${req.title}</div>
        <div style="color:var(--text-muted);margin-bottom:.75rem;">by ${req.author}</div>
        <div style="font-size:.82rem;color:var(--text-secondary);margin-bottom:.75rem;">${req.description || 'No description.'}</div>
        <div style="font-size:.8rem;"><strong>Genres:</strong> ${(req.genre||[]).join(', ') || '—'}</div>
        <div style="font-size:.8rem;margin-top:.4rem;"><strong>Submitted by:</strong> ${req.requester_email}</div>
        ${req.pdf_url ? `<a href="${req.pdf_url}" target="_blank" class="btn btn-ghost btn-sm" style="margin-top:.75rem;">📄 View PDF</a>` : ''}
      </div>
    </div>`;
  openModal('reviewModal');
};

async function approveRequest() {
  if (!currentReviewId) return;
  const { data: req } = await supabaseClient.from('book_requests').select('*').eq('id', currentReviewId).single();
  if (!req) return;

  // Insert into books
  const { error } = await supabaseClient.from('books').insert({
    title: req.title, author: req.author, description: req.description,
    genre: req.genre, cover_url: req.cover_url, pdf_url: req.pdf_url,
    uploaded_by: req.requested_by, approved_by: adminUser.id, status: 'approved'
  });
  if (error) { showToast('Failed to approve: ' + error.message, 'error'); return; }

  await supabaseClient.from('book_requests').update({ status: 'approved', updated_at: new Date().toISOString() }).eq('id', currentReviewId);
  closeModal('reviewModal');
  showToast(`"${req.title}" approved and published! ✅`, 'success');
  await loadOverview();
}

async function rejectRequest() {
  if (!currentReviewId) return;
  const reason = prompt('Reason for rejection (optional):') || '';
  await supabaseClient.from('book_requests').update({ status: 'rejected', admin_note: reason, updated_at: new Date().toISOString() }).eq('id', currentReviewId);
  closeModal('reviewModal');
  showToast('Request rejected.', 'info');
  await loadOverview();
}

// ── All Books ──────────────────────────────────────────────
async function loadAllBooks() {
  const { data } = await supabaseClient.from('books').select('*').order('created_at', { ascending: false });
  const books = data || [];
  document.getElementById('booksTotalCount').textContent = `${books.length} books`;
  document.getElementById('booksTable').innerHTML = books.length ? `
    <div class="admin-table-wrapper"><table class="admin-table">
      <thead><tr><th>Cover</th><th>Title</th><th>Author</th><th>Genre</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>${books.map(b => `<tr>
        <td>${b.cover_url ? `<img src="${b.cover_url}" style="width:36px;height:52px;object-fit:cover;border-radius:4px;"/>` : '📖'}</td>
        <td><strong>${b.title}</strong></td>
        <td>${b.author}</td>
        <td style="font-size:.78rem;">${(b.genre||[]).slice(0,2).join(', ')}</td>
        <td><span class="status-badge ${b.status}">${b.status}</span></td>
        <td style="display:flex;gap:.4rem;">
          <a href="reader.html?id=${b.id}" class="btn btn-ghost btn-sm" target="_blank">📖 Read</a>
          <button class="btn btn-ghost btn-sm" onclick="openDelete('${b.id}')" style="color:#e74c3c;">🗑</button>
        </td>
      </tr>`).join('')}</tbody>
    </table></div>` : `<div class="empty-state"><div class="empty-state-icon">📚</div><h3>No books yet</h3></div>`;
}

window.openDelete = (id) => {
  currentDeleteId = id;
  openModal('deleteModal');
};

// ── Admin Upload ───────────────────────────────────────────
function renderAdminGenres() {
  const container = document.getElementById('adminGenreChecks');
  GENRES.forEach(g => {
    const label = document.createElement('label');
    label.className = 'genre-check-item';
    label.innerHTML = `<input type="checkbox" value="${g}"/>${g}`;
    container.appendChild(label);
  });
}

async function adminUpload() {
  const title = document.getElementById('adTitle').value.trim();
  const author = document.getElementById('adAuthor').value.trim();
  const desc = document.getElementById('adDesc').value.trim();
  const year = document.getElementById('adYear').value;
  const pdfFile = document.getElementById('adPdfFile').files[0];
  const coverFile = document.getElementById('adCoverFile').files[0];
  const genres = [...document.querySelectorAll('#adminGenreChecks input:checked')].map(i => i.value);

  if (!title || !author || !pdfFile) { showToast('Title, author, and PDF are required', 'error'); return; }

  const btn = document.getElementById('adminUploadBtn');
  btn.disabled = true; btn.textContent = 'Uploading…';

  try {
    const pdfPath = `admin/${Date.now()}_${pdfFile.name}`;
    const { error: pdfErr } = await supabaseClient.storage.from('books-pdf').upload(pdfPath, pdfFile);
    if (pdfErr) throw pdfErr;
    const { data: { publicUrl: pdfUrl } } = supabaseClient.storage.from('books-pdf').getPublicUrl(pdfPath);

    let coverUrl = null;
    if (coverFile) {
      const coverPath = `admin/${Date.now()}_${coverFile.name}`;
      await supabaseClient.storage.from('book-covers').upload(coverPath, coverFile);
      const { data: { publicUrl } } = supabaseClient.storage.from('book-covers').getPublicUrl(coverPath);
      coverUrl = publicUrl;
    }

    const { error: bookErr } = await supabaseClient.from('books').insert({
      title, author, description: desc, genre: genres,
      pdf_url: pdfUrl, cover_url: coverUrl,
      uploaded_by: adminUser.id, approved_by: adminUser.id,
      published_year: year ? parseInt(year) : null,
      status: 'approved'
    });
    if (bookErr) throw bookErr;

    showToast(`"${title}" uploaded and published! 🎉`, 'success');
    ['adTitle','adAuthor','adDesc','adYear'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('adPdfFile').value = '';
    document.getElementById('adCoverFile').value = '';
    document.getElementById('adPdfFileName').textContent = '';
    document.getElementById('adCoverFileName').textContent = '';
    document.querySelectorAll('#adminGenreChecks input').forEach(i => i.checked = false);
  } catch(err) {
    showToast(err.message || 'Upload failed', 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Upload Book';
  }
}

// ── Users ──────────────────────────────────────────────────
async function loadUsers() {
  const { data } = await supabaseClient.from('profiles').select('*').order('created_at', { ascending: false });
  const users = data || [];
  document.getElementById('usersTable').innerHTML = users.length ? `
    <div class="admin-table-wrapper"><table class="admin-table">
      <thead><tr><th>Username</th><th>Email</th><th>Role</th><th>Joined</th><th>Actions</th></tr></thead>
      <tbody>${users.map(u => `<tr>
        <td><strong>${u.username || '—'}</strong></td>
        <td style="font-size:.82rem;">${u.email}</td>
        <td><span class="status-badge ${u.role === 'admin' ? 'approved' : 'pending'}">${u.role}</span></td>
        <td style="font-size:.8rem;">${new Date(u.created_at).toLocaleDateString()}</td>
        <td>${u.id !== adminUser.id ? `<button class="btn btn-ghost btn-sm" onclick="toggleRole('${u.id}','${u.role}')">${u.role === 'admin' ? 'Revoke Admin' : 'Make Admin'}</button>` : '(you)'}</td>
      </tr>`).join('')}</tbody>
    </table></div>` : `<div class="empty-state"><div class="empty-state-icon">👥</div><h3>No users</h3></div>`;
}

window.toggleRole = async (userId, currentRole) => {
  const newRole = currentRole === 'admin' ? 'user' : 'admin';
  if (!confirm(`Change role to "${newRole}"?`)) return;
  await supabaseClient.from('profiles').update({ role: newRole }).eq('id', userId);
  showToast('Role updated', 'success');
  await loadUsers();
};

// ── Events ─────────────────────────────────────────────────
function setupEvents() {
  document.getElementById('signOutBtn').addEventListener('click', signOut);
  document.getElementById('approveBtn').addEventListener('click', approveRequest);
  document.getElementById('rejectBtn').addEventListener('click', rejectRequest);
  document.getElementById('adminUploadBtn').addEventListener('click', adminUpload);
  document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
    if (!currentDeleteId) return;
    await supabaseClient.from('books').delete().eq('id', currentDeleteId);
    closeModal('deleteModal');
    showToast('Book deleted', 'info');
    await loadAllBooks();
  });

  // File names
  document.getElementById('adPdfFile').addEventListener('change', e => {
    document.getElementById('adPdfFileName').textContent = e.target.files[0]?.name || '';
  });
  document.getElementById('adCoverFile').addEventListener('change', e => {
    document.getElementById('adCoverFileName').textContent = e.target.files[0]?.name || '';
  });
}

init();
</script>
</body>
</html>
